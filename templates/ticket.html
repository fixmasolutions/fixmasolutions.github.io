<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket de Venta</title>
    <style>
        /* Reset de estilos */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Courier New', Courier, monospace, sans-serif;
            background-color: #f4f4f4;
            padding: 20px 0;
            color: #333;
            font-size: 12px;
            line-height: 1.4;
        }

        /* Contenedor del Ticket (Estilo Térmico 80mm) */
        .ticket-container {
            width: 80mm;
            max-width: 100%;
            margin: 0 auto;
            background: #fff;
            padding: 15mm 5mm;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.05);
            border-radius: 2px;
        }

        /* Encabezado */
        .header {
            text-align: center;
            margin-bottom: 12px;
        }

        .header h1 {
            font-size: 18px;
            font-weight: bold;
            text-transform: uppercase;
            color: #111;
            margin-bottom: 4px;
        }

        .header p {
            font-size: 11px;
            color: #555;
            margin: 2px 0;
        }

        /* Divisores elegantes */
        .divider {
            border-top: 1px dashed #666;
            margin: 8px 0;
        }

        .double-divider {
            border-top: 1px dashed #666;
            border-bottom: 1px dashed #666;
            height: 3px;
            margin: 10px 0;
        }

        /* Sección de metadatos del cliente/venta */
        .info-section {
            font-size: 11px;
            margin-bottom: 8px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin: 3px 0;
        }

        .info-row span.label {
            font-weight: bold;
            color: #222;
        }

        .info-row span.value {
            text-align: right;
            max-width: 60%;
            word-wrap: break-word;
        }

        .condicion-badge {
            background-color: #eee;
            padding: 1px 6px;
            font-size: 10px;
            border-radius: 3px;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* Tabla de Productos */
        .table-container {
            margin: 10px 0;
        }

        .table-header {
            display: flex;
            font-weight: bold;
            font-size: 11px;
            padding-bottom: 4px;
            border-bottom: 1px dashed #aaa;
            text-transform: uppercase;
        }

        .table-row {
            display: flex;
            padding: 6px 0;
            border-bottom: 1px dashed #eee;
            align-items: flex-start;
        }

        /* Proporciones de columnas */
        .col-desc {
            flex: 2.2;
            word-wrap: break-word;
        }

        .col-qty {
            flex: 0.6;
            text-align: center;
        }

        .col-price {
            flex: 1;
            text-align: right;
        }

        .col-subtotal {
            flex: 1.2;
            text-align: right;
            font-weight: bold;
        }

        /* Totales */
        .totals-section {
            margin-top: 8px;
            font-size: 11px;
        }

        .totals-row {
            display: flex;
            justify-content: space-between;
            margin: 4px 0;
        }

        .totals-row.grand-total {
            font-size: 14px;
            font-weight: bold;
            border-top: 1px dashed #666;
            padding-top: 6px;
            margin-top: 6px;
        }

        /* Pie de página */
        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 11px;
        }

        .footer p {
            margin: 4px 0;
            font-style: italic;
        }

        /* Botones de acción */
        .actions {
            text-align: center;
            margin-top: 20px;
        }

        .actions button {
            padding: 8px 16px;
            font-size: 13px;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            margin: 0 5px;
            border: 1px solid #ccc;
            background-color: #fff;
            color: #333;
            border-radius: 4px;
            transition: all 0.2s ease;
        }

        .actions button:hover {
            background-color: #333;
            color: #fff;
            border-color: #333;
        }

        /* Configuración de Impresión */
        @media print {
            .actions {
                display: none;
            }

            body {
                background-color: #fff;
                padding: 0;
                margin: 0;
            }

            .ticket-container {
                width: 100%;
                max-width: 80mm;
                box-shadow: none;
                padding: 0;
                margin: 0;
            }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.2/html2pdf.bundle.min.js"></script>
</head>

<body>

    <div class="ticket-container" id="invoice-template">
        <div class="header">
            <h1 id="empresaNombre">Lavanderia Charlie</h1>
            <h4 id="empresaLema">Lema</h4>
            <p id="empresaDireccion">Ciudad</p>
            <p id="empresaTelefono">Tel: 3461-3602</p>
        </div>

        <div class="divider"></div>

        <div class="info-section">
            <div class="info-row">
                <span class="label">Transacción:</span>
                <span class="value" id="transaccion">-</span>
            </div>
            <div class="info-row">
                <span class="label">Fecha:</span>
                <span class="value" id="fecha">-</span>
            </div>
            <div class="info-row">
                <span class="label">Condición:</span>
                <span class="value"><span class="condicion-badge" id="condicion">-</span></span>
            </div>
        </div>

        <div class="divider"></div>

        <div class="info-section">
            <div class="info-row">
                <span class="label">Cliente:</span>
                <span class="value" id="cliente">-</span>
            </div>
            <div class="info-row">
                <span class="label">NIT:</span>
                <span class="value" id="nit">-</span>
            </div>
            <div class="info-row">
                <span class="label">Dirección:</span>
                <span class="value" id="direccion">-</span>
            </div>
            <div class="info-row">
                <span class="label">Teléfono:</span>
                <span class="value" id="telefono">-</span>
            </div>
        </div>

        <div class="double-divider"></div>

        <div class="table-container">
            <div class="table-header">
                <div class="col-desc">Descripción</div>
                <div class="col-qty">Cant</div>
                <div class="col-price">P.U.</div>
                <div class="col-subtotal">Total</div>
            </div>
            <div id="products-table">
                </div>
        </div>

        <div class="totals-section">
            <div class="totals-row">
                <span>SubTotal:</span>
                <span id="subtotalticket">0.00</span>
            </div>
            <div class="totals-row">
                <span>Descuento:</span>
                <span id="descuento">0.00</span>
            </div>
            <div class="totals-row grand-total">
                <span>TOTAL:</span>
                <span id="total">0.00</span>
            </div>
        </div>

        <div class="double-divider"></div>

            <!-- PUBLICIDAD -->
        <!-- <div class="ad-box">
            <div class="ad-tag">Soluciones Integrales</div>
            <div class="ad-title">MULTISERVICIOS JIREH</div>
            
            <div class="ad-services-list">
                • <strong>Gestiones de Vehículos:</strong> Traspasos de carros/motos, tarjeta de circulación, placas.<br>
                • <strong>Servicios Legales:</strong> Contratos, auténticas y asesoría con Abogado y Notario.<br>
                • <strong>Contable/SAT:</strong> Inscripción NIT, Agencia Virtual, limpieza de Omisos y pago de impuestos.<br>
                • <strong>Trámites Administrativos:</strong> RENAP, Antecedentes, Patentes de Comercio.<br>
                • <strong>Sistemas:</strong> Implementación y consultoría de Odoo ERP.
            </div>

            <div class="ad-promo-container">
                <div class="ad-promo-header">🔥 ¡BENEFICIO EXCLUSIVO! 🔥</div>
                <div class="ad-promo-text">
                    Conserve este comprobante y obtenga un descuento especial en su próximo <strong>traspaso de vehículo</strong>.
                </div>
            </div>

            <div class="ad-location">
                📍 Manzana A Lote 10 Ciudad Quetzal, San Juan Sacatepéquez. Frente a Shell de Autobanco.
            </div>
        </div>

        <div class="divider"></div> -->

        <div class="footer">
            <p id="empresaMensaje">¡Gracias por su preferencia!</p>
            <p>*** Conserve este comprobante ***</p>
        </div>
    </div>

    <div class="actions">
        <button id="printButton" onclick="window.print()">Imprimir Ticket</button>
        <button id="pdfButton">Generar PDF</button>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            
            // Función helper para obtener parámetros de URL
            const getParam = (param) => urlParams.get(param) || '';

            // Parámetros de la Empresa
            const empresaNombre = getParam('ename');
            const empresaLema = getParam('elema');
            const empresaDireccion = getParam('edir');
            const empresaTelefono = getParam('etel') ? 'Tel: ' + getParam('etel') : '---- ----';
            const empresaMensaje = getParam('emessage');

            // Parámetros del Cliente
            const nit = getParam('cnit');
            const cliente = getParam('cname');
            const direccion = getParam('cdir');
            const telefono = getParam('ctel');
            
            // Datos del Documento
            const transaccion = getParam('transaccion');
            const fecha = getParam('docfecha');
            const condicion = getParam('doccondicion');
            const subtotalticket = getParam('docsubtotalticket');
            const descuento = getParam('docdescuento');
            const total = getParam('doctotal');

            // Arrays de Detalle de Productos
            const codigos = getParam('detcod') ? getParam('detcod').split(' , ').map(item => item.trim()) : [];
            const unidadMed = getParam('detmedida') ? getParam('detmedida').split(' , ').map(item => item.trim()) : [];
            const productos = getParam('detproducto') ? getParam('detproducto').split(' , ').map(item => item.trim()) : [];
            const cantidades = getParam('detcantidad') ? getParam('detcantidad').split(' , ').map(item => item.trim()) : [];
            const precios = getParam('detprecioUnit') ? getParam('detprecioUnit').split(' , ').map(item => item.trim()) : [];
            const subtotales = getParam('detsubtotal') ? getParam('detsubtotal').split(' , ').map(item => item.trim()) : [];

            // Formateador numérico estándar
            const formatter = new Intl.NumberFormat("en-US", { 
                minimumFractionDigits: 2, 
                maximumFractionDigits: 2 
            });

            // Asignar los textos dinámicos
            if(empresaNombre) document.getElementById('empresaNombre').textContent = empresaNombre || 'Lavanderia';
            if(empresaLema) document.getElementById('empresaLema').textContent = empresaLema || 'Lema';
            if(empresaDireccion) document.getElementById('empresaDireccion').textContent = empresaDireccion || '';
            if(empresaTelefono) document.getElementById('empresaTelefono').textContent = empresaTelefono;
            if(empresaMensaje) document.getElementById('empresaMensaje').textContent = empresaMensaje || '¡Gracias por su compra!';

            if(nit) document.getElementById('nit').textContent = nit || 'CF';
            if(cliente) document.getElementById('cliente').textContent = decodeURIComponent(cliente || 'Consumidor Final');
            if(direccion) document.getElementById('direccion').textContent = decodeURIComponent(direccion || 'Ciudad');
            if(telefono) document.getElementById('telefono').textContent = telefono || '---- ----';
            if(transaccion) document.getElementById('transaccion').textContent = transaccion || '---';
            if(fecha) document.getElementById('fecha').textContent = decodeURIComponent(fecha) || '---';
            if(condicion) document.getElementById('condicion').textContent = condicion || 'Contado';

            // Formatear montos principales
            if(subtotalticket) document.getElementById('subtotalticket').textContent = formatter.format(parseFloat(subtotalticket) || 0);
            if(descuento) document.getElementById('descuento').textContent = formatter.format(parseFloat(descuento) || 0);
            if(total) document.getElementById('total').textContent = formatter.format(parseFloat(total) || 0);

            // Cargar productos en formato ticket
            const productsTable = document.getElementById('products-table');
            productsTable.innerHTML = ''; // Limpiar previo

            for (let i = 0; i < productos.length; i++) {
                if (!productos[i]) continue;
                
                const row = document.createElement('div');
                row.className = 'table-row';
                
                // Formar descripción (ej: "Camisas (Pza)")
                const descText = codigos[i] && unidadMed[i] 
                    ? `${decodeURIComponent(productos[i])} (${decodeURIComponent(unidadMed[i])})` 
                    : decodeURIComponent(productos[i]);

                const cant = cantidades[i] || '0';
                const pUnit = parseFloat(precios[i]) || 0;
                const subT = parseFloat(subtotales[i]) || 0;

                row.innerHTML = `
                    <div class="col-desc">${descText}</div>
                    <div class="col-qty">${cant}</div>
                    <div class="col-price">${formatter.format(pUnit)}</div>
                    <div class="col-subtotal">${formatter.format(subT)}</div>
                `;
                productsTable.appendChild(row);
            }

            // PDF adaptado a dimensiones de ticket de 80mm
            document.getElementById('pdfButton').addEventListener('click', () => {
                const element = document.getElementById('invoice-template');
                const options = {
                    margin: [2, 2, 2, 2],
                    filename: `ticket_${transaccion || 'venta'}.pdf`,
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: { scale: 3 }, // Mayor escala para conservar fuentes nítidas
                    jsPDF: { unit: 'mm', format: [80, 300], orientation: 'portrait' }, // Formato personalizado térmico
                };
                html2pdf().from(element).set(options).save();
            });
        });
    </script>

</body>

</html>
