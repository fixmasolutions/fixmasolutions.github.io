<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comprobante</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            /* margin: 20px; */
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: auto;
            padding: 20px;
            background: #fff;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .header {
            text-align: center;
            border-bottom: 2px solid #333;
            padding-bottom: 5px;
            margin-bottom: 5px;
        }

        .header h1 {
            font-size: 24px;
            margin: 0;
            color: #2c3e50;
        }

        .header p {
            margin: 5px 0;
            font-size: 14px;
            color: #7f8c8d;
        }

        .info-container {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .info-left,
        .info-right {
            width: 48%;
        }

        .info-left p,
        .info-right p {
            margin: 5px 0;
            font-size: 12px;
        }

        .info-left p span,
        .info-right p span {
            font-weight: bold;
        }

        .info-right p.condicion {
            background-color: #ffc107;
            padding: 5px 10px;
            border-radius: 5px;
            display: inline-block;
        }

        .table-container {
            margin-top: 5px;
        }

        .table-header {
            display: flex;
            background-color: #2c3e50;
            color: #fff;
            padding: 8px;
            font-weight: bold;
            font-size: 12px;
        }

        .table-header>div {
            flex: 1;
            padding: 0 5px;
        }

        .table-header .qty,
        .table-header .price,
        .table-header .subtotal {
            flex: 0.2;
            text-align: right;
        }

        .table-row {
            display: flex;
            padding: 5px;
            border: 1px solid #eee;
            font-size: 12px;
        }

        .table-row>div {
            flex: 1;
            padding: 0 2px;
        }

        .table-row .qty,
        .table-row .price,
        .table-row .subtotal {
            flex: 0.2;
            text-align: right;
        }

        .totals {
            margin-top: 20px;
            /* padding: 10px; */
            border-top: 1px solid #eee;
            text-align: right;
            font-size: 12px;
            /* border-bottom: 1px solid #eee; */
        }

        .totals p {
            margin: 5px 0;
        }

        .totals p span {
            display: inline-block;
            width: 100px;
            font-weight: bold;
            /* border-bottom: 1px solid #ccc; */
        }

        .totals p.total-monto {
            font-size: 12px;
            width: 100%;
            font-weight: bold;
            border-top: 1px solid #eee;
            padding-top: 5px;
        }

        .footer {
            text-align: center;
            margin-top: 10px;
            font-size: 12px;
            color: #7f8c8d;
        }

        .actions {
            text-align: center;
            margin-top: 20px;
        }

        .actions button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            margin: 0 10px;
            border: none;
            color: white;
            border-radius: 5px;
        }

        #printButton {
            background-color: #007bff;
        }

        #pdfButton {
            background-color: #28a745;
        }

        @media print {
            .actions {
                display: none;
            }

            body {
                background-color: #fff;
                margin: 0;
                padding: 0;
            }
            .container {
                max-width: 100%;
                box-shadow: inherit;
                margin: 0;
                padding: 0;
                margin-top: 0;
            }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.2/html2pdf.bundle.min.js"></script>
</head>

<body>

    <div class="container" id="invoice-template">
        <div class="header">
            <h1>Lavanderia Charlie</h1>
            <p>2da Av 4-55 Zona 2 Boca del monte Villa Canales</p>
            <p>Tel: 3461-3602</p>
        </div>

        <div class="info-container">
            <div class="info-left">
                <p>Nit Cliente: <span id="nit"></span></p>
                <p>Cliente: <span id="cliente"></span></p>
                <p>Dirección: <span id="direccion"></span></p>
                <p>Teléfono: <span id="telefono"></span></p>
            </div>
            <div class="info-right">
                <p>Nota de venta</p>
                <p>No: <span id="transaccion"></span></p>
                <p>Fecha: <span id="fecha"></span></p>
                <p class="condicion">Condición: <span id="condicion"></span></p>
            </div>
        </div>

        <div class="table-container">
            <div class="table-header">
                <div>Description</div>
                <div class="qty">Qty</div>
                <div class="price">P. Unit</div>
                <div class="subtotal">SubTotal</div>
            </div>
            <div id="products-table">
            </div>
        </div>

        <div class="totals">
            <p>SubTotal: <span id="subtotalticket"></span></p>
            <p>Descuento: <span id="descuento"></span></p>
            <p class="total-monto">Monto Total: <span id="total"></span></p>
        </div>

        <div class="footer">
            <p>Gracias por su compra!</p>
        </div>
    </div>

    <div class="actions">
        <button id="printButton" onclick="window.print()">Imprimir</button>
        <button id="pdfButton">Generar PDF</button>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);

            // Función para obtener valores de la URL
            const getParam = (param) => urlParams.get(param) || '';

            // Obtener los datos de los parámetros de la URL
            const transaccion = getParam('transaccion');
            const nit = getParam('nit');
            const cliente = getParam('cliente');
            const direccion = getParam('direccion');
            const telefono = getParam('telefono');
            const fecha = getParam('fecha');
            const condicion = getParam('condicion');
            const subtotalticket = getParam('subtotalticket');
            const descuento = getParam('descuento');
            const total = getParam('total');

            // Parámetros con múltiples valores separados por coma
            const codigos = getParam('codigo').split(' , ').map(item => item.trim());
            const productos = getParam('producto').split(' , ').map(item => item.trim());
            const cantidades = getParam('cantidad').split(' , ').map(item => item.trim());
            const precios = getParam('precio').split(' , ').map(item => item.trim());
            const subtotales = getParam('subtotal').split(' , ').map(item => item.trim());

            // Insertar datos en la plantilla
            document.getElementById('nit').textContent = nit;
            document.getElementById('cliente').textContent = decodeURIComponent(cliente || 'CF');
            document.getElementById('direccion').textContent = decodeURIComponent(direccion || 'Ciudad');
            document.getElementById('telefono').textContent = telefono || '---- ----';
            document.getElementById('transaccion').textContent = transaccion;
            document.getElementById('fecha').textContent = decodeURIComponent(fecha);
            document.getElementById('condicion').textContent = condicion;
            document.getElementById('subtotalticket').textContent = new Intl.NumberFormat("en-US", { minimumFractionDigits: 2 }).format(parseFloat(subtotalticket).toFixed(2));
            document.getElementById('descuento').textContent = new Intl.NumberFormat("en-US", { minimumFractionDigits: 2 }).format(parseFloat(descuento).toFixed(2));
            document.getElementById('total').textContent = new Intl.NumberFormat("en-US", { minimumFractionDigits: 2 }).format(parseFloat(total).toFixed(2));
            // Llenar la tabla de productos
            const productsTable = document.getElementById('products-table');
            for (let i = 0; i < productos.length; i++) {
                const row = document.createElement('div');
                row.className = 'table-row';
                const description = codigos[i] ? `${decodeURIComponent(productos[i])}` : decodeURIComponent(productos[i]);
                row.innerHTML = `
                    <div>${description || ''}</div>
                    <div class="qty">${cantidades[i] || ''}</div>
                    <div class="price">${new Intl.NumberFormat("en-US", { minimumFractionDigits: 2 }).format(parseFloat(precios[i] || '').toFixed(2))}</div>
                    <div class="subtotal">${new Intl.NumberFormat("en-US", { minimumFractionDigits: 2 }).format(parseFloat(subtotales[i] || '').toFixed(2))}</div>
                `;
                productsTable.appendChild(row);
            }

            // Configurar el botón de generar PDF
            document.getElementById('pdfButton').addEventListener('click', () => {
                const element = document.getElementById('invoice-template');
                const options = {
                    margin: 10,
                    filename: 'recibo_de_venta.pdf',
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: { scale: 2 },
                    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
                    // portrait
                    // landscape
                };
                html2pdf().from(element).set(options).save();
            });
        });
    </script>

</body>

</html>
